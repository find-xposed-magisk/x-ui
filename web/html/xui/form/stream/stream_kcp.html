{{define "form/streamKCP"}}
<a-form :colon="false" :label-col="{ md: {span:8} }"
    :wrapper-col="{ md: {span:14} }">
    <a-form-item label='{{ i18n "mtu" }}'>
        <a-input-number v-model.number="inbound.stream.kcp.mtu" :min="576"
            :max="1460"></a-input-number>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.stream.kcp.tti" }}'>
        <a-input-number v-model.number="inbound.stream.kcp.tti" :min="10"
            :max="100"></a-input-number>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.stream.kcp.uplinkMBps" }}'>
        <a-input-number v-model.number="inbound.stream.kcp.upCap"
            :min="0"></a-input-number>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.stream.kcp.downlinkMBps" }}'>
        <a-input-number v-model.number="inbound.stream.kcp.downCap"
            :min="0"></a-input-number>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.stream.kcp.cwndMultiplier" }}'>
        <a-input-number v-model.number="inbound.stream.kcp.cwndMultiplier"
            :min="1"></a-input-number>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.stream.kcp.maxSendingWindow" }}'>
        <a-input-number v-model.number="inbound.stream.kcp.maxSendingWindow"
            :min="1460"></a-input-number>
    </a-form-item>
</a-form>
{{end}}
