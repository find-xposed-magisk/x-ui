{{define "form/inbound"}}
<a-tabs class="inbound-detail-tabs" :animated="false" style="padding: 1rem;">
    <a-tab-pane key="in-basic" tab='{{ i18n "basic" }}'>
        <a-form :colon="false" :label-col="{ md: {span:8} }" :wrapper-col="{ md: {span:14} }">
            <a-form-item label='{{ i18n "enable" }}'>
                <a-switch v-model="dbInbound.enable"></a-switch>
            </a-form-item>
            <a-form-item label='{{ i18n "remark" }}'>
                <a-input v-model.trim="dbInbound.remark"></a-input>
            </a-form-item>

            <a-form-item label='{{ i18n "protocol" }}'>
                <a-select v-model="inbound.protocol" :disabled="isEdit" :dropdown-class-name="themeSwitcher.currentTheme">
                    <a-select-option v-for="p in Protocols" :key="p" :value="p">[[ p ]]</a-select-option>
                </a-select>
            </a-form-item>

            <a-form-item>
                <template slot="label">
                    <a-tooltip>
                        <template slot="title">
                            <span>{{ i18n "pages.inbounds.monitorDesc" }}</span>
                        </template>
                        {{ i18n "monitor" }}
                        <a-icon type="question-circle"></a-icon>
                    </a-tooltip>
                </template>
                <a-input v-model.trim="inbound.listen"></a-input>
            </a-form-item>

            <a-form-item label='{{ i18n "pages.inbounds.port" }}'>
                <a-input-number v-model.number="inbound.port" :min="1" :max="65535"></a-input-number>
            </a-form-item>

            <a-form-item>
                <template slot="label">
                    <a-tooltip>
                        <template slot="title">
                            <span>{{ i18n "pages.inbounds.meansNoLimit" }}</span>
                        </template>
                        {{ i18n "pages.inbounds.totalFlow" }}
                        <a-icon type="question-circle"></a-icon>
                    </a-tooltip>
                </template>
                <a-input-number v-model.number="dbInbound.totalGB" :min="0"></a-input-number> GB
            </a-form-item>

            <a-form-item>
                <template slot="label">
                    <a-tooltip>
                        <template slot="title">
                            <span>{{ i18n "pages.inbounds.leaveBlankToNeverExpire" }}</span>
                        </template>
                        {{ i18n "pages.inbounds.expireDate" }}
                        <a-icon type="question-circle"></a-icon>
                    </a-tooltip>
                </template>
                    <a-date-picker :show-time="{ format: 'HH:mm:ss' }" format="YYYY-MM-DD HH:mm:ss"
                        :dropdown-class-name="themeSwitcher.currentTheme"
                        v-model="dbInbound._expiryTime"></a-date-picker>
                </a-form-item>
        </a-form>
        {{template "form/sniffing"}}
    </a-tab-pane>

    <a-tab-pane key="in-protocol" tab='{{ i18n "protocol" }}'>
        <template v-if="inbound.protocol === Protocols.VMESS">
            {{template "form/vmess"}}
        </template>

        <template v-if="inbound.protocol === Protocols.VLESS">
            {{template "form/vless"}}
        </template>

        <template v-if="inbound.protocol === Protocols.TROJAN">
            {{template "form/trojan"}}
        </template>

        <template v-if="inbound.protocol === Protocols.SHADOWSOCKS">
            {{template "form/shadowsocks"}}
        </template>

        <template v-if="inbound.protocol === Protocols.HYSTERIA">
            {{template "form/hysteria"}}
        </template>

        <template v-if="inbound.protocol === Protocols.DOKODEMO">
            {{template "form/dokodemo"}}
        </template>

        <template v-if="inbound.protocol === Protocols.SOCKS">
            {{template "form/socks"}}
        </template>

        <template v-if="inbound.protocol === Protocols.HTTP">
            {{template "form/http"}}
        </template>

        <template v-if="inbound.protocol === Protocols.WIREGUARD">
            {{template "form/wireguard"}}
        </template>

        <template v-if="inbound.protocol === Protocols.TUN">
            {{template "form/tun"}}
        </template>
    </a-tab-pane>

    <a-tab-pane v-if="inbound.canEnableStream()" key="in-transmission" tab='{{ i18n "pages.inbounds.transportConfig" }}'>
        {{template "form/streamSettings"}}
    </a-tab-pane>

    <a-tab-pane v-if="inbound.canEnableTls()" key="in-security" tab='{{ i18n "security" }}'>
        {{template "form/tlsSettings"}}
    </a-tab-pane>

    <a-tab-pane v-if="inbound.canEnableStream()" key="in-external-proxy" tab='{{ i18n "pages.inbounds.stream.common.externalProxy" }}'>
        {{template "form/externalProxy" }}
    </a-tab-pane>
</a-tabs>
{{end}}
