{{define "form/tlsSettings"}}
<!-- tls enable -->
<a-form v-if="inbound.canEnableTls()" :colon="false" :label-col="{ md: {span:8} }" :wrapper-col="{ md: {span:14} }">
    <template v-if="inbound.protocol !== Protocols.HYSTERIA">
    <a-form-item label='{{ i18n "security" }}'>
        <a-radio-group v-model="inbound.stream.security" button-style="solid">
            <a-radio-button value="none">{{ i18n "none" }}</a-radio-button>
            <a-radio-button value="tls">TLS</a-radio-button>
            <a-radio-button v-if="inbound.canEnableReality()" value="reality">Reality</a-radio-button>
        </a-radio-group>
    </a-form-item>
    </template>

    <!-- tls settings -->
    <template v-if="inbound.stream.isTls">
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.sni" }}'
            placeholder='{{ i18n "pages.inbounds.stream.tls.sniDesc" }}'>
            <a-input v-model.trim="inbound.stream.tls.sni"></a-input>
        </a-form-item>
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.cipherSuites" }}'>
            <a-select v-model="inbound.stream.tls.cipherSuites" :dropdown-class-name="themeSwitcher.currentTheme">
                <a-select-option value="">Auto</a-select-option>
                <a-select-option v-for="key,value in TLS_CIPHER_OPTION" :value="key">[[ value ]]</a-select-option>
            </a-select>
        </a-form-item>
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.minMaxVersion" }}'>
            <a-input-group compact>
                <a-select v-model="inbound.stream.tls.minVersion" style="width:100px;"
                    :dropdown-class-name="themeSwitcher.currentTheme">
                    <a-select-option v-for="key in TLS_VERSION_OPTION" :value="key">[[ key ]]</a-select-option>
                </a-select>
                <a-select v-model="inbound.stream.tls.maxVersion" style="width:100px;"
                    :dropdown-class-name="themeSwitcher.currentTheme">
                    <a-select-option v-for="key in TLS_VERSION_OPTION" :value="key">[[ key ]]</a-select-option>
                </a-select>
            </a-input-group>
        </a-form-item>
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.uTLS" }}'>
            <a-select v-model="inbound.stream.tls.settings.fingerprint"
                :dropdown-class-name="themeSwitcher.currentTheme">
                <a-select-option value=''>None</a-select-option>
                <a-select-option v-for="key in UTLS_FINGERPRINT" :value="key">[[ key ]]</a-select-option>
            </a-select>
        </a-form-item>
        <a-form-item label='{{ i18n "alpn" }}'>
            <a-select mode="multiple" :dropdown-class-name="themeSwitcher.currentTheme"
                v-model="inbound.stream.tls.alpn">
                <a-select-option v-for="alpn in ALPN_OPTION" :value="alpn">[[ alpn ]]</a-select-option>
            </a-select>
        </a-form-item>
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.allowInsecure" }}'>
            <a-switch v-model="inbound.stream.tls.settings.allowInsecure"></a-switch>
        </a-form-item>
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.rejectUnknownSni" }}'>
            <a-switch v-model="inbound.stream.tls.rejectUnknownSni"></a-switch>
        </a-form-item>
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.disableSystemRoot" }}'>
        <a-switch v-model="inbound.stream.tls.disableSystemRoot"></a-switch>
        </a-form-item>
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.sessionResumption" }}'>
        <a-switch v-model="inbound.stream.tls.enableSessionResumption"></a-switch>
        </a-form-item>
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.curvePreferences" }}'>
            <a-select mode="tags" :dropdown-class-name="themeSwitcher.currentTheme"
                v-model="inbound.stream.tls.curvePreferences">
                <a-select-option v-for="c in ['x25519','curvep256','curvep384','curvep521','x25519mlkem768','secp256r1mlkem768','secp384r1mlkem1024']" :value="c">[[ c ]]</a-select-option>
            </a-select>
        </a-form-item>
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.masterKeyLog" }}'>
            <a-input v-model.trim="inbound.stream.tls.masterKeyLog"></a-input>
        </a-form-item>
        <a-divider :style="{ margin: '0' }"></a-divider>
        <template v-for="cert,index in inbound.stream.tls.certs">
            <a-form-item label='{{ i18n "certificate" }}'>
                <a-radio-group v-model="cert.useFile" button-style="solid">
                    <a-radio-button :value="true">{{ i18n "pages.inbounds.certificatePath" }}</a-radio-button>
                    <a-radio-button :value="false">{{ i18n "pages.inbounds.certificateContent" }}</a-radio-button>
                </a-radio-group>
                <a-button v-if="index === 0" type="primary" size="small" @click="inbound.stream.tls.addCert()"
                    style="margin-left: 10px">+</a-button>
                <a-button v-if="inbound.stream.tls.certs.length>1" type="primary" size="small"
                    @click="inbound.stream.tls.removeCert(index)" style="margin-left: 10px">-</a-button>
            </a-form-item>
            <template v-if="cert.useFile">
                <a-form-item label='{{ i18n "pages.inbounds.publicKeyPath" }}'>
                    <a-input v-model.trim="cert.certFile"></a-input>
                </a-form-item>
                <a-form-item label='{{ i18n "pages.inbounds.keyPath" }}'>
                    <a-input v-model.trim="cert.keyFile"></a-input>
                </a-form-item>
                <a-form-item label=" ">
                    <a-button type="primary" icon="import" @click="setDefaultCertData(index)">{{ i18n
                        "pages.inbounds.setDefaultCert" }}</a-button>
                </a-form-item>
            </template>
            <template v-else>
                <a-form-item label='{{ i18n "pages.inbounds.publicKeyContent" }}'>
                    <a-input type="textarea" :rows="3" v-model="cert.cert"></a-input>
                </a-form-item>
                <a-form-item label='{{ i18n "pages.inbounds.keyContent" }}'>
                    <a-input type="textarea" :rows="3" v-model="cert.key"></a-input>
                </a-form-item>
            </template>
            <a-form-item label='{{ i18n "pages.inbounds.stream.tls.ocspStapling" }}'>
                <a-input-number v-model.number="cert.ocspStapling" :min="0"></a-input-number>
            </a-form-item>
        </template>
        <template v-if="inbound.stream.tls.certs.filter(c => c.certFile?.length>0 || c.cert?.length>0).length>0">
            <a-divider :style="{ margin: '0' }"></a-divider>
            <a-form-item label='{{ i18n "pages.xray.outbound.tlsExtra.pinnedPeerCert" }}'>
                <a-divider :style="{ margin: '0' }"></a-divider>
                <a-select mode="tags" v-model="inbound.stream.tls.settings.pinnedPeerCertSha256"
                    placeholder='{{ i18n "pages.xray.outbound.mux.pinnedSha256" }}'
                    :dropdown-class-name="themeSwitcher.currentTheme" :token-separators="[',']" style="width: 100%;">
                </a-select>
                <a-button type="primary" icon="import" @click="getCertHash">Get Cert Hash</a-button>
            </a-form-item>
        </template>
        <a-divider :style="{ margin: '0' }"></a-divider>
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.echKey" }}'>
            <a-input v-model="inbound.stream.tls.echServerKeys"></a-input>
        </a-form-item>
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.echConfig" }}'>
            <a-input v-model="inbound.stream.tls.settings.echConfigList"></a-input>
        </a-form-item>
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.echForceQuery" }}'>
            <a-select v-model="inbound.stream.tls.echForceQuery" :dropdown-class-name="themeSwitcher.currentTheme">
                <a-select-option v-for="key in ['none', 'half', 'full']" :value="key">[[ key ]]</a-select-option>
            </a-select>
        </a-form-item>
        <a-form-item label='{{ i18n "pages.inbounds.stream.tls.echSockopt" }}'>
            <a-switch v-model="inbound.stream.tls.echSockoptSwitch"></a-switch>
        </a-form-item>
        <template v-if="inbound.stream.tls.echSockoptSwitch">
            {{template "form/sockoptFields" "inbound.stream.tls.echSockopt"}}
        </template>
        <a-form-item label=" ">
            <a-space>
                <a-button type="primary" icon="import" @click="getNewEchCert">Get New ECH Cert</a-button>
                <a-button danger @click="clearEchCert">Clear</a-button>
            </a-space>
        </a-form-item>
    </template>

    <!-- reality settings -->
    <template v-if="inbound.stream.isReality">
        {{template "form/realitySettings"}}
    </template>

</a-form>
{{end}}
