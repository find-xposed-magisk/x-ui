{{define "form/realitySettings"}}
<template>
    <a-form-item label='{{ i18n "pages.inbounds.stream.reality.show" }}'>
        <a-switch v-model="inbound.stream.reality.show"></a-switch>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.stream.reality.xver" }}'>
        <a-input-number v-model.number="inbound.stream.reality.xver" :min="0"></a-input-number>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.stream.tls.uTLS" }}'>
        <a-select v-model="inbound.stream.reality.settings.fingerprint"
            :dropdown-class-name="themeSwitcher.currentTheme">
            <a-select-option v-for="key in UTLS_FINGERPRINT" :value="key">[[ key ]]</a-select-option>
        </a-select>
    </a-form-item>
    <a-form-item label='{{ i18n "dest" }}'>
        <a-input v-model.trim="inbound.stream.reality.dest"></a-input>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.stream.tls.sni" }}'>
        <a-input v-model.trim="inbound.stream.reality.serverNames"></a-input>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    <span>{{ i18n "reset" }}</span>
                </template>
                Short IDs
                <a-icon @click="inbound.stream.reality.shortIds = RandomUtil.randomShortId().join(',')" type="sync">
                </a-icon>
        </template>
        <a-input v-model.trim="inbound.stream.reality.shortIds"></a-input>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.stream.reality.spiderX" }}'>
        <a-input v-model.trim="inbound.stream.reality.settings.spiderX"></a-input>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.stream.reality.privateKey" }}'>
        <a-input v-model.trim="inbound.stream.reality.privateKey"></a-input>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.stream.reality.publicKey" }}'>
        <a-input v-model.trim="inbound.stream.reality.settings.publicKey"></a-input>
    </a-form-item>
    <a-form-item label=" ">
        <a-space>
            <a-button type="primary" icon="import" @click="getNewX25519Cert">Get New Cert</a-button>
            <a-button danger @click="clearX25519Cert">Clear</a-button>
        </a-space>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.stream.reality.mldsa65Seed" }}'>
        <a-input v-model="inbound.stream.reality.mldsa65Seed"></a-input>
    </a-form-item>
    <a-form-item label='{{ i18n "pages.inbounds.stream.reality.mldsa65Verify" }}'>
        <a-textarea v-model="inbound.stream.reality.settings.mldsa65Verify"></a-textarea>
    </a-form-item>
    <a-form-item label=" ">
        <a-space>
            <a-button type="primary" icon="import" @click="getNewmldsa65">Get New Seed</a-button>
            <a-button danger @click="clearMldsa65">Clear</a-button>
        </a-space>
    </a-form-item>
    <a-collapse style="margin-bottom: 14px;">
        <a-collapse-panel header='{{ i18n "pages.inbounds.stream.reality.limitFallback" }}'>
            <a-divider style="margin:0 0 14px 0;">{{ i18n "pages.inbounds.stream.reality.limitFallbackUpload" }}</a-divider>
            <a-form-item label='{{ i18n "pages.inbounds.stream.reality.afterBytes" }}'>
                <a-input-number v-model.number="inbound.stream.reality.limitFallbackUpload.afterBytes" :min="0" style="width: 100%;"></a-input-number>
            </a-form-item>
            <a-form-item label='{{ i18n "pages.inbounds.stream.reality.bytesPerSec" }}'>
                <a-input-number v-model.number="inbound.stream.reality.limitFallbackUpload.bytesPerSec" :min="0" style="width: 100%;"></a-input-number>
            </a-form-item>
            <a-form-item label='{{ i18n "pages.inbounds.stream.reality.burstBytesPerSec" }}'>
                <a-input-number v-model.number="inbound.stream.reality.limitFallbackUpload.burstBytesPerSec" :min="0" style="width: 100%;"></a-input-number>
            </a-form-item>
            <a-divider style="margin:0 0 14px 0;">{{ i18n "pages.inbounds.stream.reality.limitFallbackDownload" }}</a-divider>
            <a-form-item label='{{ i18n "pages.inbounds.stream.reality.afterBytes" }}'>
                <a-input-number v-model.number="inbound.stream.reality.limitFallbackDownload.afterBytes" :min="0" style="width: 100%;"></a-input-number>
            </a-form-item>
            <a-form-item label='{{ i18n "pages.inbounds.stream.reality.bytesPerSec" }}'>
                <a-input-number v-model.number="inbound.stream.reality.limitFallbackDownload.bytesPerSec" :min="0" style="width: 100%;"></a-input-number>
            </a-form-item>
            <a-form-item label='{{ i18n "pages.inbounds.stream.reality.burstBytesPerSec" }}'>
                <a-input-number v-model.number="inbound.stream.reality.limitFallbackDownload.burstBytesPerSec" :min="0" style="width: 100%;"></a-input-number>
            </a-form-item>
        </a-collapse-panel>
    </a-collapse>
</template>
{{end}}
